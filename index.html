<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo Test Mundial - B.A.P.A.</title>
  <style>
    :root { --azul:#2c3e50; --dorado:#f1c40f; --naranja:#e67e22; --blanco:#fff; }
    * { box-sizing:border-box; }
    body {
      min-height:100vh; margin:0; padding:24px; font-family:Arial,sans-serif; text-align:center;
      color:var(--blanco); background:var(--azul); display:flex; flex-direction:column; align-items:center;
    }
    h1 { margin:0 0 12px; font-size:clamp(2rem,5vw,3rem); text-shadow:2px 2px 4px rgba(0,0,0,.5); }
    .subtitulo { margin:0 0 16px; max-width:650px; line-height:1.4; opacity:.92; }
    .panel, .resultado-ronda {
      width:min(100%,620px); padding:14px; margin-bottom:16px; border-radius:12px;
      background:rgba(255,255,255,.12); box-shadow:0 4px 15px rgba(0,0,0,.25);
    }
    .panel { display:flex; justify-content:center; align-items:center; gap:12px; flex-wrap:wrap; }
    button { font:inherit; border:0; border-radius:7px; padding:10px 16px; cursor:pointer; color:#fff; background:var(--naranja); transition:.2s; }
    button:hover { background:#d35400; }
    button:active { transform:scale(.97); }
    button:disabled { cursor:not-allowed; opacity:.55; }
    .tablero {
      display:grid; grid-template-columns:repeat(4, min(135px, 20vw)); gap:12px; padding:16px;
      border-radius:12px; background:rgba(255,255,255,.10); box-shadow:0 4px 15px rgba(0,0,0,.3);
    }
    .carta { width:min(135px,20vw); aspect-ratio:1; position:relative; cursor:pointer; transform-style:preserve-3d; transition:transform .3s; }
    .carta:active { transform:scale(.95); }
    .carta.volteada, .carta.encontrada { transform:rotateY(180deg); }
    .carta.encontrada { cursor:default; }
    .frente, .atras {
      position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border:2px solid var(--blanco);
      border-radius:9px; box-shadow:0 2px 5px rgba(0,0,0,.25); backface-visibility:hidden;
    }
    .frente { transform:rotateY(180deg); }
    .atras { background:var(--dorado); }
    #info-game { display:flex; flex-wrap:wrap; justify-content:center; gap:10px 24px; margin:18px 0 12px; font-size:1.12rem; }
    #info-game div { font-weight:bold; }
    .resultado-ronda { display:none; }
    .resultado-ronda h2 { margin:0 0 10px; font-size:1.35rem; }
    .resultado-ronda table { width:100%; border-collapse:collapse; }
    .resultado-ronda th, .resultado-ronda td { padding:8px 5px; border-bottom:1px solid rgba(255,255,255,.22); }
    .resultado-ronda tr:last-child td { border-bottom:0; }
    .message-box {
      display:none; position:fixed; z-index:1000; top:50%; left:50%; width:min(90%,460px); transform:translate(-50%,-50%);
      padding:30px; border-radius:15px; color:#1f2d3a; background:#fff; box-shadow:0 10px 30px rgba(0,0,0,.5);
    }
    .message-box h2 { margin:0 0 10px; font-size:2rem; }
    .message-box p { margin:0; line-height:1.5; }
    .message-box button { margin-top:20px; }
    @media(max-width:520px) { body{padding:15px;} .tablero{gap:7px;padding:10px;} #info-game{font-size:1rem;} }
  </style>
</head>
<body>
  <h1>Memo Test Mundial - B.A.P.A.</h1>
  <p class="subtitulo">Ronda de dos equipos: gana quien consiga más aciertos; si empatan, gana quien lo logra en menor tiempo.</p>

  <div class="panel">
    <strong id="estado-ronda">Preparados para comenzar la ronda.</strong>
    <button id="boton-principal" type="button">Comenzar: Equipo 1</button>
  </div>

  <div class="tablero" id="game-board" aria-label="Tablero del juego"></div>

  <div id="info-game">
    <div id="equipo-actual">Turno: —</div>
    <div id="cronometro">Tiempo: 00:00</div>
    <div id="intentos">Intentos: 0</div>
    <div id="pares">Aciertos: 0 / 8</div>
  </div>

  <section class="resultado-ronda" id="resultado-ronda" aria-live="polite">
    <h2>Resultado de la ronda</h2>
    <table>
      <thead><tr><th>Equipo</th><th>Aciertos</th><th>Tiempo</th></tr></thead>
      <tbody id="tabla-ronda"></tbody>
    </table>
  </section>

  <div class="message-box" id="message-end" role="dialog" aria-modal="true">
    <h2 id="end-title"></h2>
    <p id="end-msg"></p>
    <button id="modal-button" type="button"></button>
  </div>

  <script>
    const board = document.getElementById('game-board');
    const principalButton = document.getElementById('boton-principal');
    const roundStatus = document.getElementById('estado-ronda');
    const teamText = document.getElementById('equipo-actual');
    const timerText = document.getElementById('cronometro');
    const attemptsText = document.getElementById('intentos');
    const pairsText = document.getElementById('pares');
    const roundResult = document.getElementById('resultado-ronda');
    const roundTable = document.getElementById('tabla-ronda');
    const messageEnd = document.getElementById('message-end');
    const endTitle = document.getElementById('end-title');
    const endMsg = document.getElementById('end-msg');
    const modalButton = document.getElementById('modal-button');

    const totalPairs = 8;
    const flagsBase = ['bandera1.png','bandera2.png','bandera3.png','bandera4.png','bandera5.png','bandera6.png','bandera7.png','bandera8.png'];

    let activeTeam = 0;
    let attempts = 0, pairsFound = 0, elapsedSeconds = 0, startTime = 0;
    let firstCard = null, secondCard = null, lockBoard = false, gameStarted = false, gameFinished = false, timerId = null;
    let resultados = [];

    function shuffle(items) { return [...items].sort(() => Math.random() - 0.5); }
    function formatTime(seconds) { return `${String(Math.floor(seconds/60)).padStart(2,'0')}:${String(seconds%60).padStart(2,'0')}`; }
    function updateTimer() { elapsedSeconds = Math.floor((Date.now()-startTime)/1000); timerText.textContent = `Tiempo: ${formatTime(elapsedSeconds)}`; }

    function createCard(img) {
      const card = document.createElement('div'); card.className = 'carta'; card.dataset.flag = img;
      const front = document.createElement('img'); front.className = 'frente'; front.src = img; front.alt = 'Bandera';
      const back = document.createElement('img'); back.className = 'atras'; back.src = 'reverso.png'; back.alt = 'Reverso de carta';
      card.append(front, back); card.addEventListener('click', flipCard); return card;
    }

    function renderBoard() {
      board.innerHTML = '';
      shuffle([...flagsBase, ...flagsBase]).forEach(flag => board.appendChild(createCard(flag)));
    }

    function resetGame() {
      clearInterval(timerId);
      attempts = 0; pairsFound = 0; elapsedSeconds = 0; firstCard = null; secondCard = null; lockBoard = false; gameStarted = false; gameFinished = false;
      attemptsText.textContent = 'Intentos: 0'; pairsText.textContent = `Aciertos: 0 / ${totalPairs}`; timerText.textContent = 'Tiempo: 00:00';
      renderBoard();
    }

    function startTurn() {
      resetGame();
      gameStarted = true;
      startTime = Date.now();
      timerId = setInterval(updateTimer, 1000);
      updateTimer();
      const teamName = `Equipo ${activeTeam + 1}`;
      teamText.textContent = `Turno: ${teamName}`;
      roundStatus.textContent = `Está jugando ${teamName}.`;
      principalButton.disabled = true;
    }

    function flipCard() {
      if (!gameStarted || gameFinished || lockBoard || this === firstCard || this.classList.contains('encontrada')) return;
      this.classList.add('volteada');
      if (!firstCard) { firstCard = this; return; }
      secondCard = this; attempts++; attemptsText.textContent = `Intentos: ${attempts}`;
      const match = firstCard.dataset.flag === secondCard.dataset.flag;
      match ? disableCards() : unflipCards();
    }

    function disableCards() {
      firstCard.classList.add('encontrada'); secondCard.classList.add('encontrada'); pairsFound++;
      pairsText.textContent = `Aciertos: ${pairsFound} / ${totalPairs}`;
      resetSelection();
      if (pairsFound === totalPairs) setTimeout(endTurn, 350);
    }

    function unflipCards() {
      lockBoard = true;
      setTimeout(() => { firstCard.classList.remove('volteada'); secondCard.classList.remove('volteada'); resetSelection(); }, 850);
    }
    function resetSelection() { firstCard = null; secondCard = null; lockBoard = false; }

    function endTurn() {
      if (!gameStarted || gameFinished) return;
      gameFinished = true; gameStarted = false; clearInterval(timerId); updateTimer();
      resultados[activeTeam] = { equipo:`Equipo ${activeTeam + 1}`, aciertos:pairsFound, tiempo:elapsedSeconds };
      if (activeTeam === 0) {
        endTitle.textContent = '¡Turno del Equipo 1 finalizado!';
        endMsg.innerHTML = `Consiguió <strong>${pairsFound}/${totalPairs} aciertos</strong> en <strong>${formatTime(elapsedSeconds)}</strong>.<br>Ahora se reiniciará el juego para el Equipo 2.`;
        modalButton.textContent = 'Comenzar Equipo 2';
        modalButton.onclick = () => { messageEnd.style.display = 'none'; activeTeam = 1; principalButton.disabled = false; principalButton.textContent = 'Comenzar: Equipo 2'; roundStatus.textContent = 'Preparados para el turno del Equipo 2.'; resetGame(); };
        messageEnd.style.display = 'block';
      } else {
        showRoundWinner();
      }
    }

    function showRoundWinner() {
      const [one, two] = resultados;
      let title, message;
      if (one.aciertos > two.aciertos || (one.aciertos === two.aciertos && one.tiempo < two.tiempo)) {
        title = '¡Felicitaciones, Equipo 1!'; message = 'Ganó esta ronda.';
      } else if (two.aciertos > one.aciertos || (one.aciertos === two.aciertos && two.tiempo < one.tiempo)) {
        title = '¡Felicitaciones, Equipo 2!'; message = 'Ganó esta ronda.';
      } else {
        title = '¡Empate!'; message = 'Ambos equipos lograron los mismos aciertos en el mismo tiempo.';
      }
      roundTable.innerHTML = resultados.map(r => `<tr><td>${r.equipo}</td><td>${r.aciertos}/${totalPairs}</td><td>${formatTime(r.tiempo)}</td></tr>`).join('');
      roundResult.style.display = 'block';
      endTitle.textContent = title;
      endMsg.innerHTML = `${message}<br><br><strong>Equipo 1:</strong> ${one.aciertos} aciertos · ${formatTime(one.tiempo)}<br><strong>Equipo 2:</strong> ${two.aciertos} aciertos · ${formatTime(two.tiempo)}`;
      modalButton.textContent = 'Iniciar nueva ronda';
      modalButton.onclick = newRound;
      messageEnd.style.display = 'block';
    }

    function newRound() {
      messageEnd.style.display = 'none'; roundResult.style.display = 'none'; resultados = []; activeTeam = 0;
      teamText.textContent = 'Turno: —'; roundStatus.textContent = 'Preparados para comenzar una nueva ronda.';
      principalButton.disabled = false; principalButton.textContent = 'Comenzar: Equipo 1'; resetGame();
    }

    principalButton.addEventListener('click', startTurn);
    resetGame();
  </script>
</body>
</html>
